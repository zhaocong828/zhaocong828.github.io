<script src="{{ '/assets/js/main.min.js' | relative_url }}"></script>

<script src="{{ '/assets/js/collapse.js' | relative_url }}"></script>

{% include analytics.html %}
{% include fetch_google_scholar_stats.html %}

<a id="lang-switcher" class="lang-switch-btn" href="/cn/">
    <span class="lang-text">中文</span>
    <i class="fas fa-language"></i>
</a>

<style>
/* 按钮基础样式 */
.lang-switch-btn {
    position: fixed;
    top: 20px;            /* 距离顶部 */
    right: 20px;          /* 距离右侧 */
    z-index: 9999;        /* 保证在最顶层 */
    background-color: #fff;
    color: #333;
    border: 1px solid #e1e4e8;
    border-radius: 30px;  /* 圆角 */
    padding: 8px 16px;
    font-weight: bold;
    font-size: 14px;
    text-decoration: none !important;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    gap: 5px;
}

/* 鼠标悬停效果 */
.lang-switch-btn:hover {
    background-color: #f6f8fa;
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(0,0,0,0.15);
    color: #007bff; /* 悬停变蓝 */
}

/* 图标微调 */
.lang-switch-btn i {
    font-size: 1.1em;
}

/* 手机端适配：位置调整，避免遮挡菜单 */
@media (max-width: 768px) {
    .lang-switch-btn {
        top: 15px;
        right: 60px; /* 给右侧的菜单按钮留出位置 */
        padding: 5px 12px;
        font-size: 12px;
    }
}
</style>

<script>
(function() {
    var btn = document.getElementById('lang-switcher');
    var textSpan = btn.querySelector('.lang-text');
    var currentPath = window.location.pathname;

    // 逻辑判断：
    // 如果当前路径包含 /cn/，说明在中文版 -> 按钮显示 "English" 并指向英文主页
    if (currentPath.indexOf('/cn/') > -1) {
        textSpan.innerText = "English";
        btn.href = "{{ '/' | relative_url }}"; // 返回英文首页
    } else {
        // 否则默认在英文版 -> 按钮显示 "中文" 并指向中文主页
        textSpan.innerText = "中文";
        btn.href = "{{ '/cn/' | relative_url }}"; // 前往中文首页
    }
})();
</script>
